version: 1
catalog:
  # Structure (types + categories) shared by every starter catalog.
  # Design principles:
  #   - Type = causal ROLE, not topic:
  #       Activity  = inputs you control (levers you pull)
  #       Condition = inputs you DON'T control (external context)
  #       Outcome   = results you measure (the things you're trying to move)
  #   - A Category is a bucket that holds SEVERAL co-typed items (never 1).
  types:
    - name: Activity
    - name: Condition
    - name: Outcome
  categories:
    # Activity — things you do / try to do
    - typeName: Activity
      name: Eating
    - typeName: Activity
      name: Exercise
    - typeName: Activity
      name: Routine
    - typeName: Activity
      name: Medication

    # Condition — external context you don't directly control
    - typeName: Condition
      name: Environment
    - typeName: Condition
      name: Weather
    - typeName: Condition
      name: Exposure

    # Outcome — results you measure (0 = absence of the thing)
    - typeName: Outcome
      name: Wellbeing
    - typeName: Outcome
      name: Symptoms
    - typeName: Outcome
      name: Vitals
